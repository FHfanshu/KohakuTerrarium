# SWE Team with Root Agent (TUI)
# Same SWE team, but with a root agent sitting OUTSIDE the terrarium.
# The root agent uses TUI I/O - user talks to root via terminal,
# root orchestrates the team via terrarium tools.
#
# Usage:
#   kt terrarium run examples/terrariums/swe_team_managed_tui/

terrarium:
  name: swe_team_managed_tui

  # Root agent config - inline, inherits from creatures/root
  # Overrides I/O to use TUI modules (same as swe_agent_tui pattern)
  root:
    base_config: creatures/root
    controller:
      model: "${OPENROUTER_MODEL:google/gemini-3-flash-preview}"
      api_key_env: OPENROUTER_API_KEY
      base_url: https://openrouter.ai/api/v1
      tool_format: native
    input:
      type: tui
      prompt: "You: "
    output:
      type: tui
      controller_direct: true

  creatures:
    - name: swe
      config: ../../../creatures/swe
      channels:
        listen: [tasks, feedback, team_chat]
        can_send: [review, team_chat]

    - name: reviewer
      config: ../../../creatures/reviewer
      channels:
        listen: [review, team_chat]
        can_send: [feedback, results, team_chat]

  channels:
    tasks:      { type: queue, description: "Task assignments from root to developer" }
    review:     { type: queue, description: "Code changes submitted for review" }
    feedback:   { type: queue, description: "Review feedback back to developer" }
    results:    { type: queue, description: "Final approved results" }
    team_chat:  { type: broadcast, description: "Team coordination and status" }
